<section id="restaurant-form-section" class="form-section">
  <form class="returned-form" onsubmit="event.preventDefault(); alert('Meal submitted for review!');">
    <h2>List a Returned Meal</h2>
    <p class="form-lead">Fill out the form below to add a new meal to the platform.</p>
    <div class="fields-row">
      <div class="form-group"><label>Restaurant Name</label><input type="text" placeholder="The Corner Bistro" required/></div>
      <div class="form-group"><label>Meal Name</label><input type="text" placeholder="e.g., Gourmet Burger" required/></div>
    </div>
    <div class="form-group">
      <label>Reason for Return</label>
      <select>
        <option value="">Select a reason...</option>
        <option>Incorrect Order</option>
        <option>Missing Items</option>
        <option>Late Delivery</option>
        <option>Cancellation</option>
        <option>Wrong Ingredients</option>
        <option>Cold food</option>
      </select>
    </div>
    <div class="fields-row">
      <div class="form-group"><label>Quantity</label><input type="number" min="1" placeholder="e.g., 5" required/></div>
      <div class="form-group"><label>Discount %</label><input type="number" min="0" max="100" placeholder="e.g., 50" required/></div>
      <div class="form-group"><label>Expiry Time</label><input type="datetime-local" required/></div>
    </div>
    <div class="form-group">
      <label>Meal Image</label>
      <div class="image-upload">
        <label for="meal-img">
          <div class="upload-area">
            <i class="fas fa-cloud-upload-alt" style="font-size:1.8rem;margin-bottom:10px;color:var(--green-mid)"></i><br/>
            <span class="upload-link">Upload a file</span> or drag and drop<br/>
            <span class="upload-hint">PNG, JPG, GIF up to 10MB</span>
          </div>
        </label>
        <input id="meal-img" type="file" accept="image/png,image/jpeg,image/gif" style="display:none"/>
      </div>
    </div>
    <button class="submit-btn" type="submit">Submit for Review</button>
  </form>
</section>

<script src="main.js"></script>
<script src="modal.js"></script>
</body>
</html>
