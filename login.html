<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Log In — Lo'ma</title>
  <link rel="stylesheet" href="style.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
</head>
<body>
<nav class="navbar" id="navbar">
  <div class="nav-container">
    <a href="index.html" class="logo">Lo'<span>ma</span></a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="new_meal.html">Fresh Meals</a></li>
      <li><a href="return_meal.html">Returned Meals</a></li>
      <li><a href="about.html">About Us</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
    <div class="nav-auth">
      <a class="login-btn" href="login.html">Log In</a>
      <a class="signup-btn" href="signup.html">Sign Up</a>
    </div>
    <button class="hamburger" id="hamburger" aria-label="Menu"><span></span><span></span><span></span></button>
  </div>
</nav>
<ul class="mobile-menu" id="mobileMenu">
  <li><a href="index.html">Home</a></li>
  <li><a href="new_meal.html">Fresh Meals</a></li>
  <li><a href="return_meal.html">Returned Meals</a></li>
  <li><a href="about.html">About Us</a></li>
  <li><a href="contact.html">Contact</a></li>
  <div class="mobile-auth">
    <a class="login-btn" href="login.html">Log In</a>
    <a class="signup-btn" href="signup.html">Sign Up</a>
  </div>
</ul>

<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <a href="index.html">Lo'<span>ma</span></a>
    </div>
    <h2>Welcome back</h2>
    <p class="auth-subtitle">Sign in to your Lo'ma account</p>

    <form onsubmit="event.preventDefault(); alert('Login successful! (Front-end demo)');">
      <div class="auth-form-group">
        <label for="email">Email address</label>
        <div class="auth-input-wrap">
          <input type="email" id="email" class="auth-input" placeholder="you@example.com" required/>
          <i class="fas fa-envelope"></i>
        </div>
      </div>
      <div class="auth-form-group">
        <label for="password">Password</label>
        <div class="auth-input-wrap">
          <input type="password" id="password" class="auth-input" placeholder="Enter your password" required/>
          <i class="fas fa-eye" id="togglePwd" onclick="togglePassword('password','togglePwd')"></i>
        </div>
      </div>
      <div class="auth-row">
        <label class="auth-check"><input type="checkbox"/> Remember me</label>
        <a href="#" class="auth-forgot">Forgot password?</a>
      </div>
      <button type="submit" class="auth-btn">Log In</button>
    </form>

    <div class="auth-divider">or continue with</div>
    <div class="auth-social">
      <button class="auth-social-btn"><i class="fab fa-google" style="color:#ea4335"></i> Google</button>
      <button class="auth-social-btn"><i class="fab fa-facebook" style="color:#1877f2"></i> Facebook</button>
    </div>

    <p class="auth-switch">Don't have an account? <a href="signup.html">Sign Up</a></p>
  </div>
</div>

<script src="main.js"></script>
<script>
function togglePassword(inputId, iconId) {
  const input = document.getElementById(inputId);
  const icon = document.getElementById(iconId);
  if (input.type === 'password') {
    input.type = 'text';
    icon.classList.replace('fa-eye', 'fa-eye-slash');
  } else {
    input.type = 'password';
    icon.classList.replace('fa-eye-slash', 'fa-eye');
  }
}
</script>
</body>
</html>
